name: CI

on:
  push:
    branches:
      - main
      - dev
      - '*devops*'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            path: my_memo_master_api
          - service: front
            path: my_memo_master_front
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run Tests
        working-directory: ${{ matrix.path }}
        run: npm run test

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            path: my_memo_master_api
          - service: front
            path: my_memo_master_front
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.path }}
        run: npm ci

      - name: Run Lint
        working-directory: ${{ matrix.path }}
        run: npm run lint
        